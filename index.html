<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Mystic Readathon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Background video element (hidden unless a video bg is selected) -->
  <video id="bg-video" autoplay muted loop playsinline></video>

  <div class="container" id="timer-container">
    <div class="top-buttons">
      <button onclick="toggleDropdown('settingsBox')">⚙️</button>
      <button onclick="minimizeBox('timer-container', 'minimized-buttons')">➖</button>
    </div>

    <!-- Mode heading -->
    <div id="mode">Reading/Productivity</div>

    <!-- Timer -->
    <div id="timer" class="glow-text">60:00</div>
    
    <!-- Controls -->
    <div class="controls-row">
      <div class="dropdown">
      <button onclick="toggleDropdown('modeDropdown')">Mode</button>
      <div id="modeDropdown" class="dropdown-content hidden">
        <div onclick="changeMode('Reading/Productivity')">Reading/Productivity</div>
        <div onclick="changeMode('Break/Chat')">Break/Chat</div>
        <div onclick="changeMode('Short Sprint')">Short Sprint</div>
      </div>
    </div>
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    </div>
    
<!-- Settings box MOVED here -->
  <!-- Settings box MOVED here -->
<div class="settings-box hidden" id="settingsBox">
    <label for="workMinutes">Reading/Productivity (min):</label>
    <input id="workMinutes" type="number" min="1" />

    <label for="shortBreak">Break/Chat (min):</label>
    <input id="shortBreak" type="number" min="1" />

    <label for="longBreak">Short Sprint (min):</label>
    <input id="longBreak" type="number" min="1" />

    <label for="soundSelect">Timer End Sound:</label>
    <select id="soundSelect">
      <option value="forest.mp3">Forest</option>
      <option value="WitchPain.mp3">Witch Pain</option>
      <option value="graduation.mp3">Graduation</option>
      <option value="school bell.mp3">School Bell</option>
      <option value="town square bell.mp3">Town Square Bell</option>
      <option value="italy bell.mp3">Italy Bell</option>
    </select>

    <label for="backgroundSelect">Choose Background:</label>
    <select id="backgroundSelect" onchange="changeBackground(this.value)">
      <option value="Shadowstalker Forrest.png">Shadowstalker Forrest</option>
      <option value="Occultists Office.png">Occultists Office</option>
      <option value="Graduation Ceremony.png">Graduation Ceremony</option>
      <option value="Tomb Warden Hallway.png">Tomb Warden Hallway</option>
      <option value="Town Square.png">Town Square</option>
      <option value="Linguists Italy.png">Linguists Italy</option>
      <option value="Piazza.mp4">Place Holder</option>
    </select>
  </div>
</div>

  
  <div class="spotify-box" id="spotify-box">
    <div class="top-buttons">
      <button onclick="minimizeBox('spotify-box', 'minimized-buttons')">➖</button>
    </div>
    <input id="spotifyInput" type="text" placeholder="Paste Spotify link" />
    <button onclick="updateSpotifyEmbed()">Load Playlist</button>
    <div id="spotify-controls"></div>
  </div>

  <div id="minimized-buttons"></div>
  <script src="script.js"></script>
</body>
</html>
